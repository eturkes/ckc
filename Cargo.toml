# Cargo.toml — Rust workspace root (SPEC §5-6). Members are added by their build
# units: core-ids -> crates/ckc-core, smt-emit -> crates/ckc-smt,
# corecli -> crates/ckc-core-cli. Shared edition/version and dependency versions
# live here so member manifests inherit via `workspace = true`.
[workspace]
resolver = "3"
members = ["crates/ckc-core"]

[workspace.package]
edition = "2024"
version = "0.0.0"

# Single source of truth for external dependency versions across crates.
[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
num-bigint = "0.4"
num-rational = "0.4"
serde_json = "1"
unicode-normalization = "0.1"
sha2 = "0.11"
