[workspace]
resolver = "3"
members = [
    "crates/ckc-cli",
    "crates/ckc-compile",
    "crates/ckc-core",
    "crates/ckc-store",
    "crates/ckc-retrieve",
    "crates/ckc-term",
]

[workspace.package]
edition = "2024"
license = "Apache-2.0 WITH LLVM-exception"

[workspace.dependencies]
clap = { version = "4", features = ["derive"] }
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
schemars = { version = "1", features = ["derive"] }
unicode-normalization = "0.1"
egg = "0.11"
oxrdf = "0.3"
oxttl = "0.2"
proptest = "1"
tempfile = "3"
# Sparse retrieval (subtask 0.7.2). lindera-tantivy 2.0.0 pins tantivy to 0.25
# and lindera to 2.x — these three versions are the only triple that compiles
# together as of 2026-05; do not bump independently.
tantivy = "0.25.0"
lindera = "2"
lindera-tantivy = { version = "2.0.0", features = ["embed-ipadic"] }
