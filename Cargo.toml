[workspace]
resolver = "3"
members = ["crates/ckc-core"]

[workspace.package]
edition = "2024"
license = "Apache-2.0 WITH LLVM-exception"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
num-bigint = "0.4"
num-integer = "0.1"
num-traits = "0.2"
unicode-normalization = "0.1"
proptest = "1"
