<h1>敗血症診療ガイドライン(合成)</h1>
<h2>CQ1:成人の敗血症患者に対して抗菌薬Aを投与すべきか</h2>
<p>成人(18歳以上)の敗血症患者には抗菌薬Aを投与することを推奨する(強い推奨)。</p>
<p>ただし、重度腎機能障害のある患者を除く。</p>
<h3>用語の定義</h3>
<table>
<tr><th>用語</th><th>定義</th></tr>
<tr><td>成人</td><td>18歳以上の患者</td></tr>
<tr><td>小児</td><td>18歳未満の患者</td></tr>
<tr><td>重度腎機能障害</td><td>高度の腎機能低下を認める状態(合成定義)</td></tr>
</table>
<h3>エビデンス</h3>
<ul>
<li>ランダム化比較試験2件(エビデンスの確実性:中)</li>
<li>観察研究1件(エビデンスの確実性:低)</li>
</ul>
</body>
</html>
