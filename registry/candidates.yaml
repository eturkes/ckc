# SPEC §8.4 candidate entries: pipe.layered_ckcir_to_smt chains the eight
# §8.3 processing_stage entries; input/output artifact kinds (§8.3 artifact names)
# satisfy the chain rule checked by `ckc registry check`. Input lists declare
# what each processing_stage actually reads; extract is the chain head (corpus document
# input, no artifact kinds). All M1 processing stages are deterministic (§8.1
# runtime_ai: false).
pipelines:
  - id: pipe.layered_ckcir_to_smt
    processing_stages:
      - processing_stage.m1.extract
      - processing_stage.m1.segment
      - processing_stage.m1.normalize
      - processing_stage.m1.assemble
      - processing_stage.m1.compile
      - processing_stage.m1.verify
      - processing_stage.m1.trace
      - processing_stage.m1.report
processing_stages:
  - id: processing_stage.m1.extract
    kind: extract
    determinism: deterministic
    input_artifact_kinds: []
    output_artifact_kinds: [source_document_graph]
  - id: processing_stage.m1.segment
    kind: segment
    determinism: deterministic
    input_artifact_kinds: [source_document_graph]
    output_artifact_kinds: [segments]
  - id: processing_stage.m1.normalize
    kind: normalize
    determinism: deterministic
    input_artifact_kinds: [source_document_graph, segments]
    output_artifact_kinds: [normalization]
  - id: processing_stage.m1.assemble
    kind: assemble
    determinism: deterministic
    input_artifact_kinds: [source_document_graph, segments, normalization]
    output_artifact_kinds: [ir_bundle]
  - id: processing_stage.m1.compile
    kind: compile
    determinism: deterministic
    input_artifact_kinds: [ir_bundle]
    output_artifact_kinds: [compiled, smt_query]
  - id: processing_stage.m1.verify
    kind: verify
    determinism: deterministic
    input_artifact_kinds: [compiled, smt_query]
    output_artifact_kinds: [verifier_results]
  - id: processing_stage.m1.trace
    kind: trace
    determinism: deterministic
    input_artifact_kinds:
      [source_document_graph, segments, normalization, ir_bundle, compiled, verifier_results]
    output_artifact_kinds: [trace_bundle, lineage_index]
  - id: processing_stage.m1.report
    kind: report
    determinism: deterministic
    input_artifact_kinds:
      [source_document_graph, ir_bundle, compiled, verifier_results, trace_bundle, lineage_index]
    output_artifact_kinds: [report, run_manifest, replay_manifest]
  # M2 §9 nondeterministic model-fill (recorded I/O). single_ir target shape
  # (fills ClinicalIR over deterministic extract+segment upstream); the forthcoming
  # M2 route pipelines (route-single-ir) will reference it. route.direct_smt adds
  # its own smt_query-output entry.
  - id: processing_stage.m2.model_fill
    kind: model_fill
    determinism: nondeterministic
    input_artifact_kinds: [source_document_graph, segments]
    output_artifact_kinds: [clinical_ir]
