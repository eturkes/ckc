<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:,">
<title>CKC translation faithfulness</title>
<style>
:root {
  color-scheme: light;
  --ink: #1b2027;
  --ink-soft: #5c6672;
  --line: #e7eaee;
  --teal: #0f766e;
  --teal-bar: #14b8a6;
  --teal-track: #e6f6f3;
  --gray-bar: #b6bfc9;
  --gray-track: #eef1f4;
  --ok-bg: #e7f5ec; --ok-ink: #1d6b3a;
  --bad-bg: #fbe3e1; --bad-ink: #9a2820;
}
* { box-sizing: border-box; }
body {
  font-family: ui-sans-serif, system-ui, "Segoe UI", Roboto, sans-serif;
  max-width: 880px; margin: 0 auto; padding: 2.2rem 1.4rem 4rem;
  color: var(--ink); background: #fff; line-height: 1.45;
}
header { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; flex-wrap: wrap; }
.htitle h1 {
  font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
  font-size: 1.75rem; font-weight: 600; margin: 0; letter-spacing: -0.01em;
}
.htitle .tag { color: var(--ink-soft); font-size: .82rem; margin-top: .2rem; }
.hmeta { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: .45rem; }
#runid { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: .78rem; color: var(--ink-soft); }
.lang { display: inline-flex; gap: .25rem; }
.lang button {
  border: 1px solid #c7ccd3; background: #f6f7f9; color: var(--ink);
  padding: .12rem .55rem; cursor: pointer; font: inherit; font-size: .8rem; border-radius: 5px;
}
.lang button.active { background: var(--ink); color: #fff; border-color: var(--ink); }
#error {
  border: 1px solid #d8736a; background: #fbe3e1; color: #7c241c;
  padding: .8rem 1rem; margin: 1.4rem 0; border-radius: 6px;
  font-family: ui-monospace, monospace; white-space: pre-wrap; font-size: .85rem;
}
#loading { margin: 2rem 0; color: var(--ink-soft); }
main { margin-top: 2rem; }

.cmp { display: grid; grid-template-columns: minmax(9.5rem, 1.1fr) 2fr 2fr; column-gap: 1.6rem; }
.empty { grid-column: 1 / -1; color: var(--ink-soft); padding: 1.5rem 0; }
.ch { font-size: .82rem; font-weight: 600; padding: 0 0 .55rem; border-bottom: 2px solid var(--line); }
.ch .sub { display: block; font-weight: 400; font-size: .72rem; color: var(--ink-soft); margin-top: .1rem; }
.ch.faithful { color: var(--teal); }
.ch.verdict { color: var(--ink-soft); }
.ch.spacer { border-bottom-color: transparent; }

.mname {
  display: flex; align-items: center; min-height: 2.9rem;
  border-bottom: 1px solid var(--line); font-weight: 500; font-size: .96rem;
}
.cell {
  display: flex; align-items: center; gap: .7rem; min-height: 2.9rem;
  border-bottom: 1px solid var(--line);
}
.bar { flex: 1; height: 1.25rem; border-radius: 4px; overflow: hidden; }
.bar.faithful { background: var(--teal-track); }
.bar.verdict { background: var(--gray-track); }
.fill { display: block; height: 100%; min-width: 3px; border-radius: 4px 0 0 4px; }
.fill.faithful { background: var(--teal-bar); }
.fill.verdict { background: var(--gray-bar); }
.val { width: 3.4rem; text-align: right; font-variant-numeric: tabular-nums; font-size: .92rem; }
.val.faithful { font-weight: 600; color: var(--teal); }
.val.verdict { color: var(--ink-soft); }
.val.none { color: #aab2bc; }
.cell.row-top, .mname.row-top { padding-top: .3rem; }

.prov {
  margin-top: 1.9rem; padding-top: 1rem; border-top: 1px solid var(--line);
  color: var(--ink-soft); font-size: .82rem;
  display: flex; flex-wrap: wrap; gap: .35rem .7rem; align-items: center;
}
.prov .dot { color: #c7ccd3; }
.prov .mono { font-family: ui-monospace, monospace; }
.chip { padding: .08rem .5rem; border-radius: 999px; font-size: .76rem; font-weight: 600; }
.chip.ok { background: var(--ok-bg); color: var(--ok-ink); }
.chip.bad { background: var(--bad-bg); color: var(--bad-ink); }
[hidden] { display: none !important; }
@media (max-width: 540px) {
  .cmp { grid-template-columns: 1fr; row-gap: 0; }
  .ch.spacer { display: none; }
  .ch { padding-top: 1rem; }
  .mname { border-bottom: none; padding-top: 1rem; font-weight: 600; }
  .cell { padding-bottom: .2rem; }
}
</style>
</head>
<body>
<header>
  <div class="htitle">
    <h1 data-i18n="title"></h1>
    <div class="tag" data-i18n="tag"></div>
  </div>
  <div class="hmeta">
    <span class="lang"><button id="btn-en" type="button">EN</button><button id="btn-ja" type="button">JA</button></span>
    <span id="runid"></span>
  </div>
</header>
<div id="error" hidden></div>
<div id="loading" data-i18n="loading"></div>
<main id="main" hidden>
  <div id="cmp" class="cmp"></div>
  <div id="prov" class="prov"></div>
</main>
<script>
"use strict";
var I18N = {
  en: {
    title: "Translation faithfulness",
    tag: "CKC · M2–M4 proof of concept",
    loading: "Loading results…",
    err_load: "Could not load results",
    col_method: "Method",
    col_faithful: "Faithful logic",
    col_faithful_sub: "exact match to the reference",
    col_verdict: "Conflict call",
    col_verdict_sub: "decision correct?",
    run: "run",
    pairs: "rule pairs",
    temp0: "temp 0 (single best guess)",
    keyok: "answer key verified",
    keybad: "answer key FAILED",
    replay_match: "replay matches",
    replay_bad: "replay mismatch",
    tip_validity: "valid syntax",
    tip_admission: "passed validation",
    tip_stability: "answer consistency",
    empty: "No method results in this run."
  },
  ja: {
    title: "翻訳の忠実度",
    tag: "CKC · M2–M4 概念実証",
    loading: "結果を読み込み中…",
    err_load: "結果を読み込めませんでした",
    col_method: "手法",
    col_faithful: "忠実な論理",
    col_faithful_sub: "参照と完全一致",
    col_verdict: "矛盾判定",
    col_verdict_sub: "判断は正しいか",
    run: "実行",
    pairs: "ルール対",
    temp0: "temp 0（最善の一推論）",
    keyok: "正解キー検証済み",
    keybad: "正解キー検証失敗",
    replay_match: "再現一致",
    replay_bad: "再現不一致",
    tip_validity: "構文妥当",
    tip_admission: "受理",
    tip_stability: "判定の一貫性",
    empty: "この実行には手法の結果がありません。"
  }
};
// Plain-language name for each translation method (route). Falls back to the raw id.
var ROUTE_NAME = {
  "route.reason_then_ir":  { en: "Reason, then translate", ja: "推論してから翻訳" },
  "route.draft_repair_ir": { en: "Draft, then repair",     ja: "下書きして修正" },
  "route.single_ir":       { en: "Translate in one step",  ja: "一度に翻訳" },
  "route.stacked_ir":      { en: "Stacked translation",    ja: "段階的に翻訳" },
  "route.ir_hop_chain":    { en: "Hop-chain translation",  ja: "連鎖翻訳" },
  "route.ckc_layered":     { en: "Layered translation",    ja: "層化翻訳" },
  "route.ckc_dsl":         { en: "DSL translation",        ja: "DSL翻訳" },
  "route.ckc_dsl_hop":     { en: "DSL hop-chain",          ja: "DSL連鎖" },
  "route.ckc_dsl_kw":      { en: "DSL keyword",            ja: "DSLキーワード" },
  "route.ckc_dsl_kw_hop":  { en: "DSL keyword hop",        ja: "DSLキーワード連鎖" },
  "route.direct_smt":      { en: "Direct (no translation)",ja: "直接（翻訳なし）" }
};
var FAITHFUL = "exact_ir_match";
var VERDICT = "verdict_accuracy_greedy";
var SECONDARY = [
  ["syntactic_validity", "tip_validity"],
  ["admission_rate", "tip_admission"],
  ["verdict_stability", "tip_stability"]
];
var HEX_RE = new RegExp("^[0-9a-f]{16,}$", "i");
var S = { lang: "en", report: null, url: "", error: "" };

function t(k) {
  var d = I18N[S.lang];
  return (d && Object.prototype.hasOwnProperty.call(d, k)) ? d[k] : I18N.en[k];
}
function esc(s) {
  return String(s).split("&").join("&amp;").split("<").join("&lt;").split(">").join("&gt;").split("\"").join("&quot;");
}
function routeName(id) {
  var m = ROUTE_NAME[id];
  if (m) { return S.lang === "ja" ? m.ja : m.en; }
  return id.indexOf("route.") === 0 ? id.slice(6) : String(id);
}
function pctNum(v) { var p = Math.round(v * 1000) / 10; return String(p); }
function cellOf(per, rid, metric) {
  var r = per[rid];
  return (r && r[metric]) ? r[metric] : null;
}
function prettyModel(n) {
  n = String(n || "").replace(/\.gguf$/i, "");
  if (!n) { return ""; }
  var quant = (n.match(/q\d+_k(?:_[ms])?|q\d+_\d+|iq\d+\w*|f16|bf16/i) || [])[0] || "";
  var base = n.replace(/-instruct.*/i, "").replace(/[._-]?(q\d.*|iq\d.*|f16.*|bf16.*)$/i, "");
  base = base.replace(/qwen/i, "Qwen").replace(/llama/i, "Llama").replace(/mistral/i, "Mistral")
             .replace(/(\d)b\b/i, "$1B");
  return quant ? base + " (" + quant.toUpperCase() + ")" : base;
}
// Methods that have at least one of the two headline metrics, sorted by faithfulness (then verdict).
function methodsToShow(rep) {
  var routes = (rep.routes && rep.routes.length) ? rep.routes : [];
  var per = (rep.metrics && rep.metrics.pooled) || {};
  var rows = [];
  for (var i = 0; i < routes.length; i++) {
    var id = routes[i].id;
    var f = cellOf(per, id, FAITHFUL);
    var v = cellOf(per, id, VERDICT);
    if (!f && !v) { continue; }
    rows.push({ id: id, faithful: f, verdict: v });
  }
  rows.sort(function (a, b) {
    var fa = a.faithful ? a.faithful.value : -1, fb = b.faithful ? b.faithful.value : -1;
    if (fb !== fa) { return fb - fa; }
    var va = a.verdict ? a.verdict.value : -1, vb = b.verdict ? b.verdict.value : -1;
    return vb - va;
  });
  return rows;
}
function secondaryTip(per, id) {
  var bits = [];
  for (var i = 0; i < SECONDARY.length; i++) {
    var c = cellOf(per, id, SECONDARY[i][0]);
    if (c) { bits.push(t(SECONDARY[i][1]) + " " + pctNum(c.value) + "%"); }
  }
  return bits.join("  ·  ");
}
function barCell(cell, kind, topClass) {
  if (!cell) {
    return "<div class=\"cell " + topClass + "\"><span class=\"val none\">–</span></div>";
  }
  var w = (cell.value * 100).toFixed(1);
  var tip = cell.num + "/" + cell.den;
  return "<div class=\"cell " + topClass + "\" title=\"" + esc(tip) + "\">" +
    "<span class=\"bar " + kind + "\"><span class=\"fill " + kind + "\" style=\"width:" + w + "%\"></span></span>" +
    "<span class=\"val " + kind + "\">" + esc(pctNum(cell.value)) + "%</span></div>";
}
function renderComparison(rep) {
  var per = (rep.metrics && rep.metrics.pooled) || {};
  var rows = methodsToShow(rep);
  if (rows.length === 0) {
    document.getElementById("cmp").innerHTML = "<div class=\"empty\">" + esc(t("empty")) + "</div>";
    return;
  }
  var h = "<div class=\"ch spacer\">" + esc(t("col_method")) + "</div>" +
    "<div class=\"ch faithful\">" + esc(t("col_faithful")) +
      "<span class=\"sub\">" + esc(t("col_faithful_sub")) + "</span></div>" +
    "<div class=\"ch verdict\">" + esc(t("col_verdict")) +
      "<span class=\"sub\">" + esc(t("col_verdict_sub")) + "</span></div>";
  for (var i = 0; i < rows.length; i++) {
    var tc = i === 0 ? "row-top" : "";
    var tip = secondaryTip(per, rows[i].id);
    h += "<div class=\"mname " + tc + "\"" + (tip ? " title=\"" + esc(tip) + "\"" : "") + ">" +
      esc(routeName(rows[i].id)) + "</div>";
    h += barCell(rows[i].faithful, "faithful", tc);
    h += barCell(rows[i].verdict, "verdict", tc);
  }
  document.getElementById("cmp").innerHTML = h;
}
function renderProvenance(rep) {
  var parts = [];
  var counts = rep.counts || {};
  var n = counts.groups;
  if (typeof n === "number") { parts.push("<span>" + n + " " + esc(t("pairs")) + "</span>"); }
  var model = prettyModel(rep.identities && rep.identities.model_name);
  if (model) { parts.push("<span class=\"mono\">" + esc(model) + "</span>"); }
  parts.push("<span>" + esc(t("temp0")) + "</span>");
  var gg = rep.gold_gate || {};
  parts.push("<span class=\"chip " + (gg.pass ? "ok" : "bad") + "\">" +
    esc(gg.pass ? t("keyok") : t("keybad")) + "</span>");
  var rp = rep.replay ? rep.replay.status : "";
  if (rp === "match") { parts.push("<span class=\"chip ok\">" + esc(t("replay_match")) + "</span>"); }
  else if (rp === "mismatch") { parts.push("<span class=\"chip bad\">" + esc(t("replay_bad")) + "</span>"); }
  document.getElementById("prov").innerHTML = parts.join("<span class=\"dot\">·</span>");
}
function applyI18n() {
  document.documentElement.lang = S.lang;
  document.title = t("title");
  var nodes = document.querySelectorAll("[data-i18n]");
  for (var i = 0; i < nodes.length; i++) {
    nodes[i].textContent = t(nodes[i].getAttribute("data-i18n"));
  }
  document.getElementById("btn-en").className = S.lang === "en" ? "active" : "";
  document.getElementById("btn-ja").className = S.lang === "ja" ? "active" : "";
}
function render() {
  var err = document.getElementById("error");
  if (S.error) { err.hidden = false; err.textContent = t("err_load") + ": " + S.url + "\n" + S.error; }
  else { err.hidden = true; }
  if (S.report) {
    var rep = S.report;
    document.getElementById("runid").textContent = t("run") + ": " + rep.run_id;
    renderComparison(rep);
    renderProvenance(rep);
  }
  applyI18n();
}
function setLang(l) {
  S.lang = l === "ja" ? "ja" : "en";
  try { localStorage.setItem("ckc_m2_lang", S.lang); } catch (e) {}
  render();
}
(function () {
  var qs = new URLSearchParams(location.search);
  var saved = qs.get("lang") || "";
  if (saved !== "ja" && saved !== "en") {
    try { saved = localStorage.getItem("ckc_m2_lang") || ""; } catch (e) {}
  }
  S.lang = saved === "ja" ? "ja" : "en";
  document.getElementById("btn-en").onclick = function () { setLang("en"); };
  document.getElementById("btn-ja").onclick = function () { setLang("ja"); };
  var run = qs.get("run");
  S.url = "../runs/" + (run ? encodeURIComponent(run) : "latest") + "/report.json";
  applyI18n();
  fetch(S.url).then(function (r) {
    if (!r.ok) { throw new Error("HTTP " + r.status); }
    return r.json();
  }).then(function (rep) {
    S.report = rep;
    document.getElementById("loading").hidden = true;
    document.getElementById("main").hidden = false;
    render();
  }).catch(function (e) {
    S.report = null;
    S.error = String(e && e.message ? e.message : e);
    document.getElementById("loading").hidden = true;
    document.getElementById("main").hidden = true;
    render();
  });
})();
</script>
</body>
</html>
