<style>

 "only_wrong": "\u8aa4\u5224\u5b9a\u306e\u884c\u306e\u307f",
 "pass": "\u5408\u683c",
 "pts": "\u30dd\u30a4\u30f3\u30c8",

 "replay": "\u30ea\u30d7\u30ec\u30a4",

 "run": "\u5b9f\u884c",
 "s_findings": "\u6240\u898b",
 "s_identity": "\u8b58\u5225\u60c5\u5831\u3068\u6765\u6b74",
 "s_matrix": "\u30b0\u30ea\u30fc\u30c7\u30a3\u5224\u5b9a\u30de\u30c8\u30ea\u30af\u30b9 (s0)",
 "s_metrics": "\u6307\u6a19",
 "s_taxonomy": "\u5931\u6557\u5206\u985e",
 "tab_pooled": "\u5168\u4f53",
 "tab_pooled_sub": "\u5168\u30bd\u30fc\u30b9",
 "tax_empty": "\u3053\u306e\u30b9\u30b3\u30fc\u30d7\u3067\u306f\u5931\u6557\u30b3\u30fc\u30c9\u306a\u3057",
 "title": "CKC M2-M4 PoC - \u7ffb\u8a33\u7d4c\u8def\u30ec\u30dd\u30fc\u30c8",
 "v_conflict": "\u77db\u76fe",
 "v_incomputable": "\u8a08\u7b97\u4e0d\u80fd",
 "v_no_conflict": "\u77db\u76fe\u306a\u3057",
 "vs_direct": "direct\u6bd4",
 "vs_ir": "single-IR\u6bd4",
 "best_dsl": "DSL\u3067\u6700\u826f"
}
};
var ROUTES_FALLBACK = [
 { "key": "direct", "id": "route.direct_smt" },
 { "key": "ir", "id": "route.single_ir" },
 { "key": "stacked", "id": "route.stacked_ir" },
 { "key": "hop", "id": "route.ir_hop_chain" },
 { "key": "layered", "id": "route.ckc_layered" }
];
var METRICS = ["syntactic_validity", "admission_rate", "verdict_accuracy_greedy", "verdict_stability"];
var DSL_KEYS = { "dsl": 1, "dslh": 1, "dslk": 1, "dslkh": 1 };
var MKEY = {
 "syntactic_validity": "m_syntactic_validity",
 "admission_rate": "m_admission_rate",
 "verdict_accuracy_greedy": "m_verdict_accuracy_greedy",
 "verdict_stability": "m_verdict_stability"
};
var VKEY = { "conflict": "v_conflict", "no_conflict": "v_no_conflict", "incomputable": "v_incomputable" };
var HEX_RE = new RegExp("^[0-9a-f]{16,}$", "i");
var S = { lang: "en", scope: "pooled", onlyWrong: true, report: null, url: "", error: "" };

function t(k) {
  var d = I18N[S.lang];
  return (d && Object.prototype.hasOwnProperty.call(d, k)) ? d[k] : I18N.en[k];
}
function esc(s) {
  return String(s).split("&").join("&amp;").split("<").join("&lt;").split(">").join("&gt;").split("\"").join("&quot;");
}
function pct(cell) { return (cell.value * 100).toFixed(1) + "% (" + cell.num + "/" + cell.den + ")"; }
function signedPts(d) { var p = d * 100; return (p > 0 ? "+" : "") + p.toFixed(1) + " " + t("pts"); }
function signedPtsShort(d) { var p = d * 100; return (p > 0 ? "+" : "") + p.toFixed(1); }
function deltaCls(d) { return d > 1e-9 ? "pos" : (d < -1e-9 ? "neg" : ""); }
function vCls(v, gold) { return v === "incomputable" ? "gray" : (v === gold ? "ok" : "bad"); }
function vlabel(v) { var k = VKEY[v]; return k ? t(k) : String(v); }
function shortHash(v) {
  if (typeof v === "string" && v.length >= 16 && HEX_RE.test(v)) { return v.slice(0, 12) + ".."; }
  return String(v);
}
function routeList(rep) {
  var rs = rep && rep.routes;
  return (rs && rs.length) ? rs : ROUTES_FALLBACK;
}
function routeLabel(r) {
  var id = r.id || r.key || "";
  return id.indexOf("route.") === 0 ? id.slice(6) : id;
}
function sourceList(rep) { return (rep && rep.sources) ? rep.sources : []; }
function perRouteMetrics(rep, scope) {
  var m = rep.metrics || {};
  if (scope === "pooled") { return m.pooled || {}; }
  return (m.by_source && m.by_source[scope]) ? m.by_source[scope] : {};
}
function deltaOf(rep, metric, scope, rid) {
  var bd = rep.baseline_delta && rep.baseline_delta[metric];
  if (!bd) { return null; }
  var obj = scope === "pooled" ? bd.pooled : (bd.by_source || {})[scope];
  if (!obj || !obj[rid] || typeof obj[rid].delta !== "number") { return null; }
  return obj[rid].delta;
}
function deltaIrOf(rep, metric, scope, rid) {
  var bd = rep.baseline_delta && rep.baseline_delta[metric];
  if (!bd) { return null; }
  var obj = scope === "pooled" ? bd.pooled : (bd.by_source || {})[scope];
  if (!obj || !obj[rid] || typeof obj[rid].delta_ir !== "number") { return null; }
  return obj[rid].delta_ir;
}
function taxOf(rep, scope) {
  var tx = rep.taxonomy || {};
  if (scope === "pooled") { return tx.pooled || {}; }
  return (tx.by_source && tx.by_source[scope]) ? tx.by_source[scope] : {};
}
function findingsIndex(rep) {
  var by = {}, meta = {}, gids = [];
  var fs = rep.findings || [];
  for (var i = 0; i < fs.length; i++) {
    var f = fs[i];
    if (!by[f.source]) { by[f.source] = {}; }
    by[f.source][f.group] = f;
    if (!meta[f.group]) {
      meta[f.group] = { id: f.group, kind: f.kind, gold: f.gold };
      gids.push(f.group);
    }
  }
  gids.sort();
  return { by: by, groups: gids.map(function (g) { return meta[g]; }) };
}
function isWrong(f) {
  var g = f.greedy || {};
  var ks = Object.keys(g);
  for (var i = 0; i < ks.length; i++) {
    if (g[ks[i]] !== f.gold) { return true; }
  }
  return false;
}
function routeHead(routes, lead) {
  var h = "<tr>" + lead;
  for (var i = 0; i < routes.length; i++) {
    h += "<th" + (routes[i].key === "direct" ? " class=\"basecol\"" : "") + ">" + esc(routeLabel(routes[i])) + "</th>";
  }
  return h + "</tr>";
}
function applyI18n() {
  document.documentElement.lang = S.lang;
  document.title = t("title");
  var nodes = document.querySelectorAll("[data-i18n]");
  for (var i = 0; i < nodes.length; i++) {
    nodes[i].textContent = t(nodes[i].getAttribute("data-i18n"));
  }
  document.getElementById("btn-en").className = S.lang === "en" ? "active" : "";
  document.getElementById("btn-ja").className = S.lang === "ja" ? "active" : "";
}
function renderBanner(rep) {
  var routes = routeList(rep);
  var per = (rep.metrics && rep.metrics.pooled) || {};
  var h = "<span class=\"blead\">" + esc(t("banner_lead")) + ":</span>";
  for (var i = 0; i < routes.length; i++) {
    var rt = routes[i];
    var cell = per[rt.id] && per[rt.id].verdict_accuracy_greedy;
    h += "<span class=\"bitem\">" + esc(routeLabel(rt)) + " " +
      (cell ? "<b title=\"" + esc(cell.num + "/" + cell.den) + "\">" + esc((cell.value * 100).toFixed(1) + "%") + "</b>"
            : "<b class=\"empty\">-</b>") + "</span>";
  }
  var bd = rep.baseline_delta && rep.baseline_delta.verdict_accuracy_greedy;
  var pd = (bd && bd.pooled) || {};
  var best = null;
  for (var j = 0; j < routes.length; j++) {
    var r2 = routes[j];
    if (r2.key === "direct" || !pd[r2.id] || typeof pd[r2.id].delta !== "number") { continue; }
    if (best === null || pd[r2.id].delta > best.d) { best = { label: routeLabel(r2), d: pd[r2.id].delta }; }
  }
  if (best !== null) {
    h += "<span class=\"bcall\">" + esc(t("best_nd")) + ": " + esc(best.label) +
      " <b class=\"chip " + deltaCls(best.d) + "\">" + esc(signedPts(best.d)) + "</b> (" + esc(t("vs_direct")) + ")</span>";
  }
  var bestDsl = null;
  for (var kk = 0; kk < routes.length; kk++) {
    var rr = routes[kk];
    if (!DSL_KEYS[rr.key] || !pd[rr.id] || typeof pd[rr.id].delta_ir !== "number") { continue; }
    if (bestDsl === null || pd[rr.id].delta_ir > bestDsl.dlt) {
      var accCell = per[rr.id] && per[rr.id].verdict_accuracy_greedy;
      bestDsl = { label: routeLabel(rr), dlt: pd[rr.id].delta_ir, acc: accCell ? (accCell.value * 100).toFixed(1) + "%" : "-" };
    }
  }
  if (bestDsl !== null) {
    h += "<span class=\"bcall\">" + esc(t("best_dsl")) + ": " + esc(bestDsl.label) +
      " <b>" + esc(bestDsl.acc) + "</b> <b class=\"chip " + deltaCls(bestDsl.dlt) + "\">" + esc(signedPts(bestDsl.dlt)) + "</b> (" + esc(t("vs_ir")) + ")</span>";
  }
  document.getElementById("banner").innerHTML = h;
}
function renderTabs(rep) {
  var el = document.getElementById("tabs");
  var srcs = sourceList(rep);
  var h = "<button type=\"button\" data-scope=\"pooled\"" + (S.scope === "pooled" ? " class=\"active\"" : "") +
    "><b data-i18n=\"tab_pooled\"></b><small data-i18n=\"tab_pooled_sub\"></small></button>";
  for (var i = 0; i < srcs.length; i++) {
    var s = srcs[i];
    var lbl = S.lang === "ja" ? s.ja : s.en;
    h += "<button type=\"button\" data-scope=\"" + esc(s.id) + "\"" + (S.scope === s.id ? " class=\"active\"" : "") +
      " title=\"" + esc(s.id) + "\"><b>" + esc(s.key) + "</b><small>" + esc(lbl) + "</small></button>";
  }
  el.innerHTML = h;
  var btns = el.querySelectorAll("button");
  for (var j = 0; j < btns.length; j++) {
    btns[j].onclick = function () { S.scope = this.getAttribute("data-scope"); renderAll(); };
  }
}
function renderMetrics(rep) {
  var routes = routeList(rep);
  var per = perRouteMetrics(rep, S.scope);
  var h = "<table><thead>" + routeHead(routes, "<th data-i18n=\"h_metric\"></th>") + "</thead><tbody>";
  for (var m = 0; m < METRICS.length; m++) {
    var name = METRICS[m];
    h += "<tr><td>" + esc(t(MKEY[name])) + "</td>";
    for (var r = 0; r < routes.length; r++) {
      var rt = routes[r];
      var cell = per[rt.id] ? per[rt.id][name] : null;
      if (!cell) { h += "<td class=\"empty\">-</td>"; continue; }
      var inner = "<span class=\"num\">" + esc(pct(cell)) + "</span>";
      if (rt.key !== "direct") {
        var d = deltaOf(rep, name, S.scope, rt.id);
        if (d !== null) {
          inner += " <span class=\"dchip " + deltaCls(d) + "\" title=\"" + esc(t("delta") + " (" + t("vs_direct") + ")") + "\">" + esc(signedPts(d)) + "</span>";
        }
        if (DSL_KEYS[rt.key]) {
          var dir = deltaIrOf(rep, name, S.scope, rt.id);
          if (dir !== null) {
            inner += " <span class=\"dchip ir " + deltaCls(dir) + "\" title=\"" + esc(t("delta") + " (" + t("vs_ir") + ")") + "\">IR " + esc(signedPtsShort(dir)) + "</span>";
          }
        }
      }
      h += "<td>" + inner + "</td>";
    }
    h += "</tr>";
  }
  document.getElementById("metrics").innerHTML = h + "</tbody></table>";
}
function renderMatrix(rep) {
  var el = document.getElementById("matrix");
  var routes = routeList(rep);
  var idx = findingsIndex(rep);
  if (idx.groups.length === 0) {
    el.innerHTML = "<p class=\"muted\" data-i18n=\"no_rows\"></p>";
    return;
  }
  var srcs = sourceList(rep);
  var h = "<table><thead>" + routeHead(routes,
    "<th data-i18n=\"h_group\"></th><th data-i18n=\"h_kind\"></th><th data-i18n=\"h_gold\"></th>") + "</thead><tbody>";
  for (var g = 0; g < idx.groups.length; g++) {
    var grp = idx.groups[g];
    h += "<tr><td>" + esc(grp.id) + "</td><td>" + esc(grp.kind) + "</td><td>" + esc(vlabel(grp.gold)) + "</td>";
    for (var r = 0; r < routes.length; r++) {
      var rid = routes[r].id;
      if (S.scope === "pooled") {
        var ent = [];
        for (var s = 0; s < srcs.length; s++) {
          var f = idx.by[srcs[s].id] && idx.by[srcs[s].id][grp.id];
          var v = (f && f.greedy) ? f.greedy[rid] : null;
          if (v !== null && v !== undefined) { ent.push({ k: srcs[s].key, v: v }); }
        }
        if (ent.length === 0) { h += "<td class=\"empty\">-</td>"; continue; }
        var nc = 0, tip = [];
        for (var e = 0; e < ent.length; e++) {
          if (ent[e].v === grp.gold) { nc++; }
          tip.push(ent[e].k + ": " + vlabel(ent[e].v));
        }
        var cls = nc === ent.length ? "ok" : (nc === 0 ? "bad" : "mid");
        h += "<td class=\"num " + cls + "\" title=\"" + esc(tip.join("\n")) + "\">" + nc + "/" + ent.length + "</td>";
      } else {
        var f2 = idx.by[S.scope] && idx.by[S.scope][grp.id];
        var v2 = (f2 && f2.greedy) ? f2.greedy[rid] : null;
        if (v2 === null || v2 === undefined) { h += "<td class=\"empty\">-</td>"; }
        else { h += "<td class=\"" + vCls(v2, grp.gold) + "\">" + esc(vlabel(v2)) + "</td>"; }
      }
    }
    h += "</tr>";
  }
  h += "</tbody></table>";
  if (S.scope === "pooled") { h += "<p class=\"muted\" data-i18n=\"legend_pooled\"></p>"; }
  el.innerHTML = h;
}
function renderTaxonomy(rep) {
  var el = document.getElementById("taxonomy");
  var routes = routeList(rep);
  var tax = taxOf(rep, S.scope);
  var codes = {};
  Object.keys(tax).forEach(function (rid) {
    Object.keys(tax[rid] || {}).forEach(function (c) { codes[c] = true; });
  });
  var list = Object.keys(codes).sort();
  if (list.length === 0) {
    el.innerHTML = "<p class=\"muted\" data-i18n=\"tax_empty\"></p>";
    return;
  }
  var h = "<table><thead>" + routeHead(routes, "<th data-i18n=\"h_code\"></th>") + "</thead><tbody>";
  for (var i = 0; i < list.length; i++) {
    h += "<tr><td>" + esc(list[i]) + "</td>";
    for (var r = 0; r < routes.length; r++) {
      var rid = routes[r].id;
      if (!tax[rid]) { h += "<td class=\"empty\">-</td>"; }
      else { h += "<td class=\"num\">" + esc(tax[rid][list[i]] || 0) + "</td>"; }
    }
    h += "</tr>";
  }
  document.getElementById("taxonomy").innerHTML = h + "</tbody></table>";
}
function renderFindings(rep) {
  var fs = rep.findings || [];
  var scoped = [];
  for (var i = 0; i < fs.length; i++) {
    if (S.scope === "pooled" || fs[i].source === S.scope) { scoped.push(fs[i]); }
  }
  var rows = [];
  for (var j = 0; j < scoped.length; j++) {
    if (!S.onlyWrong || isWrong(scoped[j])) { rows.push(scoped[j]); }
  }
  document.getElementById("fctl").innerHTML =
    "<label><input type=\"checkbox\" id=\"onlywrong\"> <span data-i18n=\"only_wrong\"></span></label>" +
    "<span class=\"muted\">" + esc(t("rows_shown")) + ": " + rows.length + " / " + scoped.length + "</span>";
  var cb = document.getElementById("onlywrong");
  cb.checked = S.onlyWrong;
  cb.onchange = function () { S.onlyWrong = this.checked; renderAll(); };
  var h = "";
  if (rows.length === 0) { h = "<p class=\"muted\" data-i18n=\"no_rows\"></p>"; }
  for (var n = 0; n < rows.length; n++) {
    var f = rows[n];
    var sent = S.lang === "ja" ? f.ja : f.en;
    h += "<div class=\"finding\"><div class=\"fhead\">" + esc(f.source) + " &middot; " + esc(f.group) + " &middot; " + esc(f.kind) + "</div>" +
      "<p class=\"fsent\">" + esc(sent) + "</p>" +
      "<blockquote lang=\"ja\"><span class=\"qlabel\" data-i18n=\"quote_a\"></span>" + esc(f.quote_a) + "</blockquote>" +
      "<blockquote lang=\"ja\"><span class=\"qlabel\" data-i18n=\"quote_b\"></span>" + esc(f.quote_b) + "</blockquote></div>";
  }
  document.getElementById("findings").innerHTML = h;
}
function flat(prefix, v, out) {
  if (v !== null && typeof v === "object") {
    var ks = Object.keys(v).sort();
    for (var i = 0; i < ks.length; i++) {
      flat(prefix ? prefix + "." + ks[i] : ks[i], v[ks[i]], out);
    }
  } else {
    out.push([prefix, shortHash(v)]);
  }
}
function renderIdentity(rep) {
  var rows = [];
  flat("", rep.identities || {}, rows);
  flat("", { "experiment": rep.experiment, "counts": rep.counts || {} }, rows);
  var h = "<table class=\"kv\"><tbody>";
  for (var i = 0; i < rows.length; i++) {
    h += "<tr><td>" + esc(rows[i][0]) + "</td><td>" + esc(rows[i][1]) + "</td></tr>";
  }
  h += "</tbody></table>";
  var rp = rep.replay ? rep.replay.status : "-";
  var rpCls = rp === "match" ? "ok" : (rp === "mismatch" ? "bad" : "gray");
  var gg = rep.gold_gate || { "pass": false, "groups": 0 };
  h += "<p class=\"status\"><span data-i18n=\"replay\"></span>: <span class=\"chip " + rpCls + "\">" + esc(rp) + "</span>" +
    " &nbsp; <span data-i18n=\"gold_gate\"></span>: <span class=\"chip " + (gg.pass ? "ok" : "bad") + "\">" +
    esc(gg.pass ? t("pass") : t("fail")) + "</span> (" + esc(gg.groups) + " <span data-i18n=\"groups\"></span>)</p>";
  h += "<p class=\"muted\" data-i18n=\"note_scope\"></p>";
  document.getElementById("identity").innerHTML = h;
}
function renderAll() {
  var err = document.getElementById("error");
  if (S.error) {
    err.hidden = false;
    err.textContent = t("err_load") + ": " + S.url + "\n" + S.error;
  } else {
    err.hidden = true;
  }
  if (S.report) {
    var rep = S.report;
    if (S.scope !== "pooled") {
      var ok = false;
      var srcs = sourceList(rep);
      for (var i = 0; i < srcs.length; i++) { if (srcs[i].id === S.scope) { ok = true; break; } }
      if (!ok) { S.scope = "pooled"; }
    }
    document.getElementById("runid").textContent = t("run") + ": " + rep.run_id;
    renderBanner(rep);
    renderTabs(rep);
    renderMetrics(rep);
    renderMatrix(rep);
    renderTaxonomy(rep);
    renderFindings(rep);
    renderIdentity(rep);
  }
  applyI18n();
}
function setLang(l) {
  S.lang = l === "ja" ? "ja" : "en";
  try { localStorage.setItem("ckc_m2_lang", S.lang); } catch (e) {}
  renderAll();
}
(function () {
  var saved = new URLSearchParams(location.search).get("lang") || "";
  if (saved !== "ja" && saved !== "en") {
    try { saved = localStorage.getItem("ckc_m2_lang") || ""; } catch (e) {}
  }
  S.lang = saved === "ja" ? "ja" : "en";
  document.getElementById("btn-en").onclick = function () { setLang("en"); };
  document.getElementById("btn-ja").onclick = function () { setLang("ja"); };
  var run = new URLSearchParams(location.search).get("run");
  S.url = "../runs/" + (run ? encodeURIComponent(run) : "latest") + "/report.json";
  applyI18n();
  fetch(S.url).then(function (r) {
    if (!r.ok) { throw new Error("HTTP " + r.status); }
    return r.json();
  }).then(function (rep) {
    S.report = rep;
    document.getElementById("loading").hidden = true;
    document.getElementById("main").hidden = false;
    renderAll();
  }).catch(function (e) {
    S.report = null;
    S.error = String(e && e.message ? e.message : e);
    document.getElementById("loading").hidden = true;
    document.getElementById("main").hidden = true;
    renderAll();
  });
})();
</script>
</body>
</html>
